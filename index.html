<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>送给你的爱心</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { position: absolute; width: 100%; height: 100%; }
        .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4d6d; font-size: 28px; font-family: "Microsoft YaHei", sans-serif; text-shadow: 0 0 10px #ff4d6d; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div class="text">我喜欢你</div>
    <canvas id="heart"></canvas>
    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const particles = [];
        function getHeartPoint(t) { return { x: 16 * Math.pow(Math.sin(t), 3), y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) }; }
        function createParticle() {
            const t = Math.random() * Math.PI * 2; const point = getHeartPoint(t); const scale = 11 + Math.random() * 4;
            particles.push({ x: width / 2 + point.x * scale, y: height / 2 + point.y * scale, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5, age: 0, maxAge: 70 + Math.random() * 30, size: 1 + Math.random() * 2 });
        }
        function draw() {
            ctx.clearRect(0, 0, width, height); if (particles.length < 600) createParticle();
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.age++;
                const pulse = 1 + 0.08 * Math.sin(Date.now() / 250);
                const finalX = (p.x - width / 2) * pulse + width / 2; const finalY = (p.y - height / 2) * pulse + height / 2;
                ctx.fillStyle = `rgba(255, 77, 109, ${1 - p.age / p.maxAge})`; ctx.beginPath(); ctx.arc(finalX, finalY, p.size, 0, Math.PI * 2); ctx.fill();
                if (p.age >= p.maxAge) particles.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
        draw();
    </script>
</body>
</html>
