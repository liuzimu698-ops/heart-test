<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>给zita宝宝的星空大爱心</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #030712; cursor: pointer; }
        canvas { position: absolute; width: 100%; height: 100%; }
        /* 针对手机长屏幕优化字体大小和居中效果 */
        .text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.96); color: #f0f7ff; font-size: 18px; font-family: "Microsoft YaHei", sans-serif; pointer-events: none; z-index: 20; opacity: 0; white-space: nowrap; text-align: center; }
        .text.active { opacity: 1; transition: opacity 1.5s ease-in-out; animation: cloudBreathe 3.5s ease-in-out infinite; }
        @keyframes cloudBreathe {
            0% { transform: translate(-50%, -50%) scale(0.95); text-shadow: 0 0 10px #bde0fe, 0 0 15px #ffafcc; }
            50% { transform: translate(-50%, -50%) scale(1.03); text-shadow: 0 0 15px #bde0fe, 0 0 25px #ffafcc, 0 0 35px #ffc6ff; }
            100% { transform: translate(-50%, -50%) scale(0.95); text-shadow: 0 0 10px #bde0fe, 0 0 15px #ffafcc; }
        }
        .music-tip { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: rgba(189, 224, 254, 0.7); font-size: 11px; font-family: "Microsoft YaHei", sans-serif; z-index: 30; pointer-events: none; transition: opacity 0.8s; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(189, 224, 254, 0.2); white-space: nowrap; }
    </style>
</head>
<body>
    <div class="music-tip" id="musicTip">🎵 触摸屏幕 开启浪漫《特别的人》</div>
    <div class="text" id="blessText">zita宝宝生活会好起来哒，不要灰心 ☁️</div>
    <canvas id="heart"></canvas>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://likepoems.com" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const particles = []; const backgroundStars = []; let currentT = 0; const totalDuration = Math.PI * 2; let isHeartFormed = false; let lastGenTime = 0; const genInterval = 45;  

        function toggleAudio(e) {
            if(e) e.preventDefault(); const music = document.getElementById('bgMusic'); const tip = document.getElementById('musicTip'); music.volume = 1.0; 
            if (music.paused) { music.play().then(() => { tip.style.opacity = '1'; tip.innerHTML = "🎵 正在播放《特别的人》"; setTimeout(() => { tip.style.opacity = '0'; }, 2000); }); } 
            else { music.pause(); tip.style.opacity = '1'; tip.innerHTML = "⏸ 音乐已暂停（点击屏幕继续）"; }
        }
        document.addEventListener('click', toggleAudio); document.addEventListener('touchstart', toggleAudio, { passive: false });

        for (let i = 0; i < 25; i++) { backgroundStars.push({ x: Math.random() * width, y: Math.random() * height, size: 0.8 + Math.random() * 1.5, alpha: Math.random(), speed: 0.008 + Math.random() * 0.012 }); }

        function drawOfficialCinnamoroll(ctx, x, y, size) {
            ctx.save(); ctx.translate(x, y); ctx.shadowColor = "rgba(189, 224, 254, 0.15)"; ctx.shadowBlur = 4; ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#c9d6ea"; ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.ellipse(-size * 0.65, 0, size * 0.45, size * 0.22, -Math.PI / 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(size * 0.65, 0, size * 0.45, size * 0.22, Math.PI / 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(0, 0, size * 0.52, size * 0.42, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = "#2b82c9"; ctx.beginPath(); ctx.arc(-size * 0.18, 0, size * 0.05, 0, Math.PI * 2); ctx.arc(size * 0.18, 0, size * 0.05, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(-size * 0.20, -size * 0.02, size * 0.015, 0, Math.PI * 2); ctx.arc(size * 0.16, -size * 0.02, size * 0.015, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "rgba(255, 182, 193, 0.85)"; ctx.beginPath(); ctx.ellipse(-size * 0.32, size * 0.1, size * 0.08, size * 0.05, 0, 0, Math.PI * 2); ctx.ellipse(size * 0.32, size * 0.1, size * 0.08, size * 0.05, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#2b82c9"; ctx.lineWidth = 1.5; ctx.lineCap = "round"; ctx.beginPath(); ctx.arc(0, size * 0.02, size * 0.06, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke(); ctx.restore();
        }

        function getHeartPoint(t) { return { x: 16 * Math.pow(Math.sin(t), 3), y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) }; }

        function createStepParticle(t) {
            const point = getHeartPoint(t); 
            // 🌟 手机智能缩放算法：如果屏幕宽度小于 600 像素（手机端），自动将爱心范围收窄至 10.5，确保不会被卡掉 🌟
            const scale = width < 600 ? 10.5 : 24; 
            // 手机上的玉桂狗颗粒适度缩小到 24-28，防止过于拥挤
            const pSize = width < 600 ? 24 + Math.random() * 4 : 52 + Math.random() * 5;
            particles.push({ x: width / 2 + point.x * scale, y: height / 2 + point.y * scale, vx: (Math.random() - 0.5) * 0.05, vy: (Math.random() - 0.5) * 0.05, size: pSize, rotation: (Math.random() - 0.5) * 0.04 });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < backgroundStars.length; i++) { const s = backgroundStars[i]; s.alpha += s.speed; if (s.alpha > 1 || s.alpha < 0.1) s.speed = -s.speed; ctx.fillStyle = `rgba(189, 224, 254, ${s.alpha})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill(); }
            const now = Date.now();
            if (currentT < totalDuration) { if (now - lastGenTime >= genInterval) { createStepParticle(currentT); currentT += 0.07; lastGenTime = now; } } 
            else if (!isHeartFormed) { isHeartFormed = true; document.getElementById('blessText').classList.add('active'); }
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; let finalX = p.x; let finalY = p.y;
                if (isHeartFormed) { const pulse = 1 + 0.02 * Math.sin(Date.now() / 280); finalX = (p.x - width / 2) * pulse + width / 2; finalY = (p.y - height / 2) * pulse + height / 2; }
                drawOfficialCinnamoroll(ctx, finalX, finalY, p.size);
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; backgroundStars.forEach(s => { s.x = Math.random() * width; s.y = Math.random() * height; }); });
        draw();
    </script>
</body>
</html>
